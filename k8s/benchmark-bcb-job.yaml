apiVersion: batch/v1
kind: Job
metadata:
  name: mdlm-benchmark-bcb-lora
  labels:
    app: mdlm-code-fixer
    task: benchmark-bcb-lora
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: mdlm-code-fixer
        task: benchmark-bcb-lora
    spec:
      restartPolicy: Never
      containers:
      - name: benchmark
        image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-devel
        command:
          - bash
          - -c
          - |
            apt-get update && apt-get install -y git &&
            pip install --no-cache-dir \
              "transformers==4.44.2" peft accelerate bitsandbytes \
              bigcodebench datasets &&
            git clone https://github.com/bhavyagupta98/mdlm-bug-fixer.git /workspace/mdlm-bug-fixer &&
            cd /workspace/mdlm-bug-fixer &&
            git checkout main &&

            echo "=== BigCodeBench (LoRA, 5 samples) ===" &&
            python run_bigcodebench.py \
              --adapter-path /outputs/run2/llada_lora/lora_adapter \
              --variant complete \
              --subset full \
              --num-samples 5 \
              --max-new-tokens 1024 \
              --steps 128 \
              --temperature 0.3 \
              --batch-size 4 \
              --instruct \
              --output-dir /outputs/benchmark_results 2>&1 | tee /outputs/bcb_instruct_lora.log

        resources:
          limits:
            nvidia.com/a100: "1"
            memory: "32Gi"
            cpu: "2"
          requests:
            nvidia.com/a100: "1"
            memory: "32Gi"
            cpu: "2"

        volumeMounts:
          - name: cache-volume
            mountPath: /cache
          - name: outputs-volume
            mountPath: /outputs
          - name: dev-shm
            mountPath: /dev/shm

        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
              optional: true
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: HF_DATASETS_CACHE
          value: "/cache/hf/datasets"
        - name: TORCH_HOME
          value: "/cache/torch"
        - name: PIP_CACHE_DIR
          value: "/cache/pip"
        - name: OUTPUT_DIR
          value: "/outputs"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"

      tolerations:
        - key: nautilus.io/reservation
          operator: Exists
          effect: NoSchedule
        - effect: NoSchedule
          key: nautilus.io/hardware
          operator: Equal
          value: large-gpu
        - effect: PreferNoSchedule
          key: nvidia.com/gpu
          operator: Exists

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                  - NVIDIA-A100-SXM4-80GB

      volumes:
        - name: cache-volume
          emptyDir:
            sizeLimit: 100Gi
        - name: outputs-volume
          persistentVolumeClaim:
            claimName: mdlm-outputs
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
